<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Subway Surfers</title>
    <script type="text/javascript" src="4399.js"></script>
    <script>
        window.config = {
            loader: 'unity',
            debug: false,
            maxRatio: 16 / 9,
            minRatio: 9 / 16,
            title: 'Subway Surfers',
            numScreenshots: 4,
            unityVersion: '2019.4.18f1',
            unityWebglBuildUrl: 'Build\/SanFrancisco.json',
            fileSize: 35,
            cachedDecompressedFileSizes: {
                'SanFrancisco.asm.code.unityweb': 9077143,
                'SanFrancisco.asm.framework.unityweb': 86369,
                'SanFrancisco.asm.memory.unityweb': 951447,
                'SanFrancisco.data.unityweb': 18323917,
                'SanFrancisco.wasm.code.unityweb': 7279617,
                'SanFrancisco.wasm.framework.unityweb': 90693,
            },
        };
    </script>

    <style>
        #fc-overlay {
            position: fixed; top: 12px; right: 12px; z-index: 999999;
            background: rgba(0,0,0,0.82); color: #fff;
            font-family: monospace; font-size: 13px;
            padding: 10px 14px; border-radius: 12px;
            min-width: 210px; user-select: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #fc-overlay h3 { margin: 0 0 8px; color: #4fc3f7; font-size: 14px; }
        #fc-canvas {
            display: block; width: 200px; height: 112px;
            border-radius: 6px; margin-bottom: 8px; background: #111;
        }
        #fc-status { color: #aaa; font-size: 12px; margin-bottom: 4px; }
        #fc-dir { font-size: 28px; text-align: center; margin: 4px 0; }
        #fc-recal {
            margin-top: 6px; width: 100%; padding: 5px;
            background: #2e7d32; color: #fff; border: none;
            border-radius: 6px; cursor: pointer; font-size: 12px;
        }
        #fc-recal:hover { background: #388e3c; }
    </style>
</head>

<body>
    <script src="./master-loader.js"></script>

    <div id="fc-overlay">
        <h3>🎮 Face Control</h3>
        <canvas id="fc-canvas" width="160" height="90"></canvas>
        <div id="fc-status">Starting…</div>
        <div id="fc-dir">⬜</div>
        <button id="fc-recal">Re-Calibrate Center</button>
    </div>

    <script type="module">
        // ── Tuning ──────────────────────────────────────────────────────
        const THRESHOLD   = 0.06;  // lower = more sensitive
        const HOLD_FRAMES = 1;     // 1 = instant response, 2 = slight debounce
        // ───────────────────────────────────────────────────────────────

        const KEYS = {
            left:  { code: "ArrowLeft",  keyCode: 37 },
            right: { code: "ArrowRight", keyCode: 39 },
            up:    { code: "ArrowUp",    keyCode: 38 },
            down:  { code: "ArrowDown",  keyCode: 40 },
        };
        const ARROWS = { left: "⬅️", right: "➡️", up: "⬆️", down: "⬇️" };

        const canvas   = document.getElementById("fc-canvas");
        const ctx      = canvas.getContext("2d");
        const statusEl = document.getElementById("fc-status");
        const dirEl    = document.getElementById("fc-dir");
        const recalBtn = document.getElementById("fc-recal");

        let center     = null;
        let activeKey  = null;
        let frameCount = { left: 0, right: 0, up: 0, down: 0 };

        function fireKey(type, dir) {
            const k = KEYS[dir];
            const opts = { code: k.code, keyCode: k.keyCode, which: k.keyCode, bubbles: true, cancelable: true };
            for (const el of [document, window, document.body, ...document.querySelectorAll("canvas")]) {
                try { el.dispatchEvent(new KeyboardEvent(type, opts)); } catch(e) {}
            }
        }

        function pressKey(dir) {
            if (activeKey === dir) return;
            if (activeKey) fireKey("keyup", activeKey);
            activeKey = dir;
            fireKey("keydown", dir);
            dirEl.textContent = ARROWS[dir];
        }

        function releaseKey() {
            if (!activeKey) return;
            fireKey("keyup", activeKey);
            activeKey = null;
            dirEl.textContent = "⬜";
        }

        recalBtn.onclick = () => { center = null; statusEl.textContent = "Recalibrated!"; };

        // ── Load the lightweight FaceDetector instead of FaceLandmarker ──
        // FaceDetector is much faster — we only need the nose tip position
        // so we use FaceLandmarker with CPU delegate (faster than GPU for small models)
        statusEl.textContent = "Loading model…";

        const { FaceLandmarker, FilesetResolver } = await import(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs"
        );

        const filesetResolver = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        );

        const faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
            baseOptions: {
                // Use the smaller/faster short-range model
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                delegate: "CPU",   // CPU is often faster than GPU for small models in browser
            },
            runningMode: "VIDEO",
            numFaces: 1,
            minFaceDetectionConfidence: 0.5,
            minFacePresenceConfidence: 0.5,
            minTrackingConfidence: 0.5,
        });

        // ── Camera — use low resolution for speed ──
        statusEl.textContent = "Opening camera…";
        const video = document.createElement("video");
        video.setAttribute("playsinline", "");
        video.setAttribute("muted", "");
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                width:  { ideal: 160 },   // low res = fast inference
                height: { ideal: 90 },
                frameRate: { ideal: 30 },
                facingMode: "user"
            }
        });
        video.srcObject = stream;
        await new Promise(r => { video.onloadedmetadata = r; video.play(); });
        statusEl.textContent = "✓ Running";

        // ── Detection loop — runs every frame, no skipping ──
        let lastTs = -1;

        function loop(now) {
            requestAnimationFrame(loop);
            if (now === lastTs) return;
            lastTs = now;

            // Draw tiny preview
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();

            const results = faceLandmarker.detectForVideo(video, now);

            if (!results.faceLandmarks || results.faceLandmarks.length === 0) {
                releaseKey();
                for (const d in frameCount) frameCount[d] = 0;
                statusEl.textContent = "❌ No face";
                return;
            }

            const nose = results.faceLandmarks[0][1];
            if (!center) center = { x: nose.x, y: nose.y };

            const dx = nose.x - center.x;
            const dy = nose.y - center.y;

            // Draw dots on preview
            const ccx = (1 - center.x) * canvas.width;
            const ccy = center.y * canvas.height;
            ctx.beginPath(); ctx.arc(ccx, ccy, 4, 0, Math.PI * 2);
            ctx.fillStyle = "#4caf50"; ctx.fill();

            const ncx = (1 - nose.x) * canvas.width;
            const ncy = nose.y * canvas.height;
            ctx.beginPath(); ctx.arc(ncx, ncy, 5, 0, Math.PI * 2);
            ctx.fillStyle = "#f44336"; ctx.fill();

            const adx = Math.abs(dx), ady = Math.abs(dy);
            let dir = null;
            if (adx > THRESHOLD || ady > THRESHOLD) {
                dir = adx >= ady
                    ? (dx > 0 ? "left" : "right")  // mirrored
                    : (dy > 0 ? "down" : "up");
            }

            for (const d in frameCount) {
                frameCount[d] = d === dir ? frameCount[d] + 1 : 0;
            }

            if (dir && frameCount[dir] >= HOLD_FRAMES) {
                pressKey(dir);
                statusEl.textContent = `→ ${dir.toUpperCase()}`;
            } else if (!dir) {
                releaseKey();
                statusEl.textContent = `CENTER`;
            }
        }

        requestAnimationFrame(loop);
    </script>

</body>
</html>
